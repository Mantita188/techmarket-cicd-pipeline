name: TechMarket EKS Deployment

on:
  workflow_dispatch:
    inputs:
      strategy:
        description: 'Estrategia de despliegue (rolling, canary, blue-green)'
        required: true
        default: 'rolling'
      eks_cluster_name:
        description: 'Nombre del Clúster EKS'
        required: true
        default: 'techmarket-cluster'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Mostrar parámetros de despliegue
        run: |
          echo "Estrategia seleccionada: ${{ github.event.inputs.strategy }}"
          echo "Cluster destino: ${{ github.event.inputs.eks_cluster_name }}"

      - name: Simulate Deploy
        run: |
          echo "Iniciando despliegue en EKS..."
          echo "kubectl config use-context ${{ github.event.inputs.eks_cluster_name }}"
          echo "kubectl apply -f deployment.yaml"
          echo "kubectl apply -f service.yaml"
          echo "Despliegue simulado correctamente 🚀"
